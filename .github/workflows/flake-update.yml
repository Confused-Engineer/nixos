name: Update flake.lock

on:
  schedule:
    - cron: '0 6 * * 1'   # Mondays 06:00 UTC
  workflow_dispatch:       # also allow manual runs

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    name: Update flake.lock
    runs-on: [self-hosted, linux]
    outputs:
      changed: ${{ steps.diff.outputs.changed }}
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          extra-conf: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: nix flake update
        run: |
          nix flake update \
            --option access-tokens "github.com=${{ secrets.GITHUB_TOKEN }}"

      - id: diff
        run: |
          if git diff --quiet flake.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/upload-artifact@v4
        if: steps.diff.outputs.changed == 'true'
        with:
          name: flake-lock
          path: flake.lock
          retention-days: 1

  build:
    name: Build ${{ matrix.host }}
    needs: update
    if: needs.update.outputs.changed == 'true'
    runs-on: [self-hosted, linux]
    strategy:
      fail-fast: false
      matrix:
        host: [desktop, laptop, kodi]
    steps:

      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          extra-conf: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - uses: actions/download-artifact@v4
        with:
          name: flake-lock

      - name: Build toplevel
        run: |
          nix build \
            .#nixosConfigurations.${{ matrix.host }}.config.system.build.toplevel \
            --print-build-logs \
            --no-link


  pr:
    name: Open PR
    needs: [update, build]
    if: needs.update.outputs.changed == 'true'
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: flake-lock

      - uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "flake.lock: weekly update"
          title: "flake.lock: weekly update"
          body: |
            Automated weekly update of `flake.lock`.

            ✅ desktop, laptop, and kodi all built successfully on x86_64-linux.
          branch: automated/flake-update
          delete-branch: true
          labels: automated, dependencies

  cleanup:
    name: Garbage collect
    needs: [update, pr]
    if: always() && needs.update.outputs.changed == 'true'
    runs-on: self-hosted
    steps:
      - name: Garbage collect
        run: |
          /nix/var/nix/profiles/default/bin/nix-collect-garbage --delete-older-than 15d
          df -h /nix/store