name: Update Flake

on:
  schedule:
    - cron: '0 2 * * *'   
  workflow_dispatch:       # also allow manual runs

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    name: Update flake.lock
    runs-on: nix
    outputs:
      changed: ${{ steps.diff.outputs.changed }}
    steps:
      - uses: actions/checkout@v5

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          extra-conf: |
            experimental-features = nix-command flakes
            accept-flake-config = true
            allow-unfree = true

      - name: nix flake update
        run: |
          nix flake update \
            --option access-tokens "github.com=${{ secrets.GITHUB_TOKEN }}"

      - id: diff
        run: |
          if git diff --quiet flake.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/upload-artifact@v4
        if: steps.diff.outputs.changed == 'true'
        with:
          name: flake-lock
          path: flake.lock
          retention-days: 1

  build:
    name: Build ${{ matrix.host }}
    needs: update
    if: needs.update.outputs.changed == 'true'
    runs-on: [self-hosted, linux]
    strategy:
      fail-fast: false
      matrix:
        host: [desktop, laptop, kodi, attic]
    steps:

      - uses: actions/checkout@v5

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          extra-conf: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - uses: actions/download-artifact@v7
        with:
          name: flake-lock


      - name: Build Toplevel
        run: |
          sudo sed -i '/^access-tokens/d' /etc/nix/nix.conf
          echo "access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}" | sudo tee -a /etc/nix/nix.conf
          TOPLEVEL=$(nix build \
            .#nixosConfigurations.${{ matrix.host }}.config.system.build.toplevel \
            --print-build-logs \
            --print-out-paths \
            --no-link)


  publish:
      name: Publish to main
      needs: [update, build]
      if: needs.update.outputs.changed == 'true'
      runs-on: nix
      steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/download-artifact@v7
        with:
          name: flake-lock

      - name: Commit and push
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
        run: |
          git add flake.lock
          git commit -m "flake.lock: weekly update

          Automated weekly update.
          ✅ desktop, laptop, and kodi all built successfully on x86_64-linux."
          git push origin HEAD:main



